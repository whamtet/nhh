<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName nhh.mooo.com

    # Static files
    DocumentRoot /home/nhh/site/static

    <Directory "/home/nhh/site/static">
        Options -Indexes
        Require all granted
    </Directory>

    # Root URL only
    ScriptAliasMatch ^/$ /home/nhh/site/src/index.bb

    # Allow CGI execution
    <Directory "/home/nhh/site/src">
        Options +ExecCGI
        AddHandler cgi-script .bb
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/nhh-error.log
    CustomLog ${APACHE_LOG_DIR}/nhh-access.log combined

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/nhh.mooo.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/nhh.mooo.com/privkey.pem
</VirtualHost>
</IfModule>
